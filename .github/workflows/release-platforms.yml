name: Release Platforms

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GodotMCP.slnx

      - name: Format (verify)
        run: dotnet format GodotMCP.slnx --verify-no-changes --no-restore

      - name: Build (analyzers)
        run: dotnet build GodotMCP.slnx -c Release --no-restore -p:RunAnalyzers=true -p:EnforceCodeStyleInBuild=true -warnaserror

      - name: Test
        run: dotnet test GodotMCP.slnx -c Release --no-build

  build-and-upload:
    needs: quality-gate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            rid: linux-x64
          - os: ubuntu-22.04
            rid: linux-arm64
          - os: windows-2022
            rid: win-x64
          - os: windows-2022
            rid: win-arm64
          - os: ubuntu-22.04
            rid: osx-x64
          - os: ubuntu-22.04
            rid: osx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish self-contained single-file
        run: |
          echo "Publishing for ${{ matrix.rid }}"
          dotnet publish GodotMCP.Server/GodotMCP.Server.csproj -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true -p:SelfContained=true -o ./out/${{ matrix.rid }}

      - name: Package artifact (non-Windows)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          RID=${{ matrix.rid }}
          cd out/${RID}
          zip -r "${{ github.workspace }}/dist/godot-mcp-${RID}.zip" .
        shell: bash

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          $RID = "${{ matrix.rid }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "out\$RID\*" -DestinationPath "${{ github.workspace }}\dist\godot-mcp-$RID.zip" -Force
        shell: pwsh

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/dist/godot-mcp-${{ matrix.rid }}.zip
          asset_name: godot-mcp-${{ matrix.rid }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
