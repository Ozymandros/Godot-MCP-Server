name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Pack
        run: dotnet pack GodotMCP.Server/GodotMCP.Server.csproj -c Release -o ./artifacts
      - name: Publish NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json

  # The publish-container job has been intentionally removed from this
  # workflow. Multi-architecture build failures were observed when the
  # runner's buildx driver did not support container-based multi-platform
  # builds. The repository includes `release-platforms.yml` which performs
  # per-RID platform builds and uploads platform-specific artifacts; rely on
  # that workflow for release binaries and avoid building/pushing a GHCR
  # image here. If you want a GHCR multi-arch image in the future, create a
  # separate workflow or enable a container buildx driver on the default
  # branch and re-add a guarded publish step.

  create_release:
    runs-on: ubuntu-latest
    needs: publish-container
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false