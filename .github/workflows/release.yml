name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore GodotMCP.slnx
      - name: Format (verify)
        run: dotnet format GodotMCP.slnx --verify-no-changes --no-restore
      - name: Build (analyzers)
        run: dotnet build GodotMCP.slnx -c Release --no-restore -p:RunAnalyzers=true -p:EnforceCodeStyleInBuild=true -warnaserror
      - name: Test
        run: dotnet test GodotMCP.slnx -c Release --no-build

  publish-nuget:
    needs: quality-gate
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore GodotMCP.slnx
      - name: Build
        run: dotnet build GodotMCP.slnx -c Release --no-restore
      - name: Pack
        run: dotnet pack GodotMCP.Server/GodotMCP.Server.csproj -c Release -o ./artifacts --no-build --no-restore
      - name: Publish NuGet
        if: env.NUGET_API_KEY != ''
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Publish NuGet symbols
        if: env.NUGET_API_KEY != ''
        run: dotnet nuget push "./artifacts/*.snupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: NuGet publish skipped (missing key)
        if: env.NUGET_API_KEY == ''
        run: echo "NUGET_API_KEY is not configured. Skipping NuGet publish."
