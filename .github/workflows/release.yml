name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Pack
        run: dotnet pack GodotMCP.Server/GodotMCP.Server.csproj -c Release -o ./artifacts
      - name: Publish NuGet
        if: env.NUGET_API_KEY != ''
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: NuGet publish skipped (missing key)
        if: env.NUGET_API_KEY == ''
        run: echo "NUGET_API_KEY is not configured. Skipping NuGet publish."
