name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore GodotMCP.slnx
      - name: Format (verify)
        run: dotnet format GodotMCP.slnx --verify-no-changes --no-restore
      - name: Build (analyzers)
        run: dotnet build GodotMCP.slnx -c Release --no-restore -p:RunAnalyzers=true -p:EnforceCodeStyleInBuild=true -warnaserror
      - name: Test
        run: dotnet test GodotMCP.slnx -c Release --no-build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t godot-mcp-server:ci .
